[pytest]
testpaths = tests
addopts = -ra
markers =
    unit: fast deterministic unit tests
    integration: integration tests across component boundaries
    e2e: end-to-end tests
    regression: fixed regression and golden trace tests
    api: FastAPI contract tests
    db: persistence tests
    runtime: hand-rolled runtime tests
    wrapper: provider wrapper tests
    telemetry: telemetry tests
    agent_cases: fixed clinical case regressions
    golden: golden trace regressions
    slow: slower tests
    live_provider: tests that require live provider access
